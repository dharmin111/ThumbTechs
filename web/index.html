<!DOCTYPE html>
<html>
<head>
    <!--
      If you are serving your web app in a path other than the root, change the
      href value below to reflect the base path you are serving from.

      The path provided below has to start and end with a slash "/" in order for
      it to work correctly.

      For more details:
      * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

      This is a placeholder for base href that will be replaced by the value of
      the `--base-href` argument provided to `flutter build`.
    -->
    <base href="$FLUTTER_BASE_HREF">

    <meta charset="UTF-8">
    <meta content="IE=Edge" http-equiv="X-UA-Compatible">
    <meta name="description" content="Thumb Tech - Membership Payment">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- iOS meta tags & icons -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="Thumb Tech">
    <link rel="apple-touch-icon" href="icons/Icon-192.png">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png"/>

    <!-- 🔥 Razorpay SDK for Web Payments -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

    <!-- 🔥 Firebase SDK for Web -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <title>Thumb Tech - Payment</title>
    <link rel="manifest" href="manifest.json">

    <style>
        /* 🔥 Loading Animation */
        #loading {
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          background: #ffffff;
          display: flex;
          justify-content: center;
          align-items: center;
          z-index: 9999;
          flex-direction: column;
        }

        .loader {
          border: 4px solid #f3f3f3;
          border-top: 4px solid #42D7D7;
          border-radius: 50%;
          width: 50px;
          height: 50px;
          animation: spin 1s linear infinite;
        }

        @keyframes spin {
          0% { transform: rotate(0deg); }
          100% { transform: rotate(360deg); }
        }

        .loader-text {
          margin-top: 16px;
          font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
          font-size: 14px;
          color: #666;
        }

        /* 🔥 Flutter App Container */
        #flutter-app {
          width: 100%;
          height: 100%;
        }
    </style>
</head>
<body>
<!-- 🔥 Loading Indicator -->
<div id="loading">
    <div class="loader"></div>
    <div class="loader-text">Loading Payment Page...</div>
</div>

<!-- 🔥 Flutter App -->
<div id="flutter-app"></div>

<!-- 🔥 Hide loading when Flutter is ready -->
<script>
    window.addEventListener('load', function() {
      // Check if Flutter is loaded
      const checkFlutter = setInterval(function() {
        if (document.getElementById('flutter-app').children.length > 0) {
          document.getElementById('loading').style.display = 'none';
          clearInterval(checkFlutter);
        }
      }, 100);

      // Fallback: hide after 5 seconds
      setTimeout(function() {
        document.getElementById('loading').style.display = 'none';
      }, 5000);
    });
</script>

<!--
  You can customize the "flutter_bootstrap.js" script.
  This is useful to provide a custom configuration to the Flutter loader
  or to give the user feedback during the initialization process.

  For more details:
  * https://docs.flutter.dev/platform-integration/web/initialization
-->
<script src="flutter_bootstrap.js" async></script>
</body>
</html>
